name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: app/go.mod
          cache: true
          cache-dependency-path: app/go.sum
      - run: cd app && go build ./...
      - run: cd app && go vet ./...
      - run: cd app && go test ./internal/...

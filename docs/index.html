<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Atrisos Docs</title>
<link rel="icon" href="./favicon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="./favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://use.hugeicons.com/font/icons.css">
<style>
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{font-family:'Hanken Grotesk',system-ui,sans-serif;-webkit-font-smoothing:antialiased;}
  ::selection{background:var(--accent-soft);}
  [data-theme="light"]{
    --bg-page:#ececed;--panel:#ffffff;--text:#1a1a1f;--muted:#6a6a73;--faint:#a3a3ad;
    --border:#ededf0;--border-strong:#e0e0e4;--hover:#f6f6f7;--pill:#f1f1f3;
    --code-bg:#ffffff;--search-bg:#ffffff;--kbd:#f2f2f4;
    --code-text:#3f3f46;--code-tag:#9333ea;--code-attr:#0d9488;--code-string:#1f9d55;--code-punct:#9333ea;
    --shadow:0 1px 2px rgba(0,0,0,.04),0 14px 50px rgba(0,0,0,.05);
    --scroll:rgba(0,0,0,.16);
  }
  [data-theme="dark"]{
    --bg-page:#000000;--panel:#0e0e11;--text:#f4f4f6;--muted:#9d9da7;--faint:#67676f;
    --border:#212126;--border-strong:#2c2c33;--hover:#18181c;--pill:#1b1b20;
    --code-bg:#141417;--search-bg:#141417;--kbd:#26262c;
    --code-text:#d4d4d8;--code-tag:#c084fc;--code-attr:#2dd4bf;--code-string:#4ade80;--code-punct:#c084fc;
    --shadow:0 1px 2px rgba(0,0,0,.4),0 18px 60px rgba(0,0,0,.55);
    --scroll:rgba(255,255,255,.16);
  }
  [data-accent="orange"]{--accent:#ef6820;--accent-soft:rgba(239,104,32,.12);}
  [data-accent="blue"]{--accent:#2f72e6;--accent-soft:rgba(47,114,230,.12);}
  [data-accent="violet"]{--accent:#7c5cff;--accent-soft:rgba(124,92,255,.13);}
  [data-accent="green"]{--accent:#16a34a;--accent-soft:rgba(22,163,74,.12);}
  .dfy-scroll::-webkit-scrollbar{width:8px;height:8px;}
  .dfy-scroll::-webkit-scrollbar-thumb{background:var(--scroll);border-radius:8px;}
  .dfy-scroll::-webkit-scrollbar-track{background:transparent;}
  .hgi-stroke{display:inline-flex;align-items:center;justify-content:center;vertical-align:middle;line-height:1;}
  .brand-mark{display:flex;align-items:center;justify-content:center;flex-shrink:0;}
  .dfy-hover-row:hover{background:var(--hover);}
  .dfy-icon-btn:hover{background:var(--hover);color:var(--text);}
  .dfy-tab:hover{color:var(--text);}
  .dfy-social:hover{color:var(--muted);}
  .dfy-nav-item:hover{background:var(--hover);}
  .dfy-toc:hover,.dfy-toc-sub:hover{color:var(--text);}
  .tpl-toolbar{display:flex;align-items:center;justify-content:space-between;gap:16px;margin:0 0 20px;flex-wrap:wrap;}
  .tpl-search{flex:1;min-width:220px;max-width:420px;height:42px;padding:0 14px;border:1px solid var(--border-strong);border-radius:11px;background:var(--search-bg);color:var(--text);font:inherit;font-size:15px;outline:none;}
  .tpl-search:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft);}
  .tpl-count{font-size:14px;color:var(--muted);white-space:nowrap;}
  .tpl-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:16px;margin:0 0 36px;}
  .tpl-card{display:flex;flex-direction:column;gap:14px;padding:20px;border:1px solid var(--border-strong);border-radius:14px;background:var(--panel);box-shadow:var(--shadow);cursor:pointer;transition:border-color .15s,transform .15s,box-shadow .15s;text-decoration:none;color:inherit;}
  .tpl-card:hover{border-color:var(--accent);transform:translateY(-2px);box-shadow:0 8px 28px rgba(0,0,0,.08);}
  [data-theme="dark"] .tpl-card:hover{box-shadow:0 8px 28px rgba(0,0,0,.35);}
  .tpl-card-head{display:flex;align-items:flex-start;gap:14px;}
  .tpl-logo{width:48px;height:48px;border-radius:12px;background:var(--pill);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;flex-shrink:0;overflow:hidden;}
  .tpl-logo img{width:28px;height:28px;display:block;}
  .tpl-title{font-size:17px;font-weight:700;color:var(--text);line-height:1.25;margin:0;}
  .tpl-desc{font-size:14px;line-height:1.55;color:var(--muted);margin:0;flex:1;}
  .tpl-foot{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-top:auto;padding-top:4px;}
  .tpl-id{font-family:'JetBrains Mono',ui-monospace,monospace;font-size:12px;color:var(--accent);background:var(--accent-soft);padding:4px 8px;border-radius:6px;}
  .tpl-copy{font-size:12px;color:var(--faint);}
  .tpl-empty{padding:48px 24px;text-align:center;color:var(--muted);border:1px dashed var(--border-strong);border-radius:14px;}
</style>
<script crossorigin src="https://unpkg.com/react@18.3.1/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/marked@12.0.2/marked.min.js"></script>
</head>
<body>
<div id="root"></div>
<script src="./app.js"></script>
</body>
</html>

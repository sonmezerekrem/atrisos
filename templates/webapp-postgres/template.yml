name: webapp-postgres
display: Web App + PostgreSQL
description: Web service backed by PostgreSQL with backup enabled
prompts:
  - name: image
    label: "Web service Docker image"
    type: string
    required: true
  - name: port
    label: "Web service container port"
    type: int
    default: "3000"
  - name: domain
    label: "Domain hostname (leave blank to skip Traefik routing)"
    type: string
    required: false
  - name: db_name
    label: "PostgreSQL database name"
    type: string
    default: "app"

name: webapp-postgres
display: Web App + PostgreSQL
description: Web service backed by PostgreSQL with backup enabled
prompts:
  - name: image
    label: "Web service Docker image"
    type: string
    required: true
  - name: port
    label: "Web service container port"
    type: int
    default: "3000"
  - name: domain
    label: "Domain hostname"
    type: string
    generate: traefik_me_domain
  - name: db_name
    label: "PostgreSQL database name"
    type: string
    default: "app"
  - name: db_password
    label: "Database password"
    type: string
    generate: random_password

name: ghost
display: Ghost
description: Ghost blog with MySQL 8 and automatic TLS
prompts:
  - name: domain
    label: "Domain hostname"
    type: string
    generate: traefik_me_domain
  - name: db_name
    label: "Ghost database name"
    type: string
    default: "ghost"
  - name: db_user
    label: "Database user"
    type: string
    default: "ghost"
  - name: db_password
    label: "Database password"
    type: string
    generate: random_password
  - name: db_root_password
    label: "MySQL root password"
    type: string
    generate: random_password
